name: Probe aggregator IP access

# Tests, from a GitHub-hosted (datacenter) IP, whether candidate tender
# aggregator APIs are reachable or serve a block page / Cloudflare challenge.
# This is the same IP class Vercel uses, so a JSON response here means the
# source could be collected from serverless without the residential workaround.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe endpoints
        run: |
          probe() {
            echo "===== $1 ====="
            echo "URL: $2"
            code=$(curl -s -o /tmp/body -w "%{http_code}" -m 25 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
              ${3:+-X POST} ${3:+-H "content-type: application/json"} ${3:+--data "$3"} \
              "$2" || echo "CURL_FAIL")
            echo "HTTP: $code"
            head -c 300 /tmp/body | tr '\n' ' '
            echo ""
            if head -c 20 /tmp/body | grep -qi "<!DOCTYPE\|<html"; then
              echo "VERDICT: HTML/BLOCK PAGE"
            elif head -c 20 /tmp/body | grep -q "{\|\["; then
              echo "VERDICT: JSON (reachable)"
            else
              echo "VERDICT: OTHER"
            fi
            echo ""
          }
          probe "infralens (baseline, known-blocked)" "https://tenders.infralens.in/api/challenge"
          probe "TendersOnTime home" "https://www.tendersontime.com/"
          probe "TendersOnTime API" "https://www.tendersontime.com/ApiTenders/getTenderDetails" '{"regionkey":"india","startpage":"1","start":"0","per_page":"5"}'
          probe "Tender247 API" "https://t247_api.tender247.com/apigateway/T247ApiTender/api/tender/search-tender" '{"search_text":"software","refine_search_text":"","page":1,"per_page":5}'
          probe "BidAssist home" "https://www.bidassist.com/"
          probe "TenderTiger home" "https://www.tendertiger.com/"
          probe "eprocure CPPP" "https://eprocure.gov.in/eprocure/app"
          probe "data.gov.in resource" "https://api.data.gov.in/resource/list?api-key=579b464db66ec23bdd000001cdd3946e44ce4aad7209ff7b23ac571b&format=json&limit=2"
